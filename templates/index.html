<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Медицинский центр</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>🏥 Медицинский центр «Здоровье»</h1>
        <p>Современная система управления пациентами</p>
    </header>

    <main>
        <section class="form-section">
            <h2>➕ Добавить пациента</h2>
            <form id="patientForm">
                <input type="text" id="name" placeholder="ФИО" required>
                <input type="number" id="age" placeholder="Возраст" required>
                <input type="text" id="diagnosis" placeholder="Диагноз" required>
                <select id="status">
                    <option value="active">Активен</option>
                    <option value="recovered">Выздоровел</option>
                    <option value="critical">Критический</option>
                </select>
                <button type="submit">💾 Добавить</button>
            </form>
        </section>

        <section class="table-section">
            <h2>📋 Список пациентов</h2>
            <div id="patientsList">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>ФИО</th>
                            <th>Возраст</th>
                            <th>Диагноз</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="patientsTableBody">
                        <!-- JS заполнит -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Медицинский центр «Здоровье»</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
