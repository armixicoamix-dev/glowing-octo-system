services:
  - type: web
    name: medical-site
    runtime: python
    repo: https://github.com/ваш-username/ваш-репозиторий
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0